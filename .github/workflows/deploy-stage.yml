name: Deploy stage

on:
  workflow_call:
    inputs:
      app_name:
        description: App name used for SSM paths (e.g. crypto-assist)
        required: true
        type: string
      stage:
        description: Deployment stage (dev, stg, prod)
        required: true
        type: string
      promote_branch:
        description: Branch to force-push HEAD to after deploy (e.g. staging, master). Leave empty to skip.
        required: false
        type: string
        default: ''
      stack:
        description: 'Backend stack type: python-sst (Python 3.12 + uv), go (Go 1.22), node (Node only)'
        required: false
        type: string
        default: 'node'
      node_version:
        description: Node.js version for tooling (npx sst, web build, etc.)
        required: false
        type: string
        default: '20'
      has_web:
        description: Whether to run scripts/ci-build-web.sh after deploy
        required: false
        type: boolean
        default: true
      aws_region:
        required: false
        type: string
        default: 'us-east-1'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      PROMOTE_TOKEN:
        description: PAT with contents:write used for branch promotion. Falls back to GITHUB_TOKEN if not provided.
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.PROMOTE_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        if: inputs.stack == 'python-sst'
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6
        if: inputs.stack == 'python-sst'

      - uses: actions/setup-go@v5
        if: inputs.stack == 'go'
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Deploy backend
        run: bash scripts/ci-deploy.sh ${{ inputs.stage }}

      - name: Read SSM outputs
        id: ssm
        run: |
          get() { aws ssm get-parameter --name "$1" --query "Parameter.Value" --output text 2>/dev/null || echo ""; }
          base="/${{ inputs.app_name }}/${{ inputs.stage }}"
          echo "pool_id=$(get $base/CognitoUserPoolId)" >> "$GITHUB_OUTPUT"
          echo "web_client_id=$(get $base/CognitoWebClientId)" >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(get $base/CognitoDomain)" >> "$GITHUB_OUTPUT"
          echo "backend_url=$(get $base/BackendApiUrl)" >> "$GITHUB_OUTPUT"
          echo "web_bucket=$(get $base/WebBucketName)" >> "$GITHUB_OUTPUT"
          echo "web_distribution_id=$(get $base/WebDistributionId)" >> "$GITHUB_OUTPUT"

      - name: Build web
        if: inputs.has_web
        run: bash scripts/ci-build-web.sh ${{ inputs.stage }}
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.ssm.outputs.pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.ssm.outputs.web_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.ssm.outputs.cognito_domain }}
          NEXT_PUBLIC_BACKEND_URL: ${{ steps.ssm.outputs.backend_url }}
          WEB_BUCKET_NAME: ${{ steps.ssm.outputs.web_bucket }}
          WEB_DISTRIBUTION_ID: ${{ steps.ssm.outputs.web_distribution_id }}

      - name: Promote branch
        if: inputs.promote_branch != ''
        run: git push origin HEAD:refs/heads/${{ inputs.promote_branch }} --force
